general:
  starting_capital: 100.0
  stake: 1.0
  win_profit: 0.9
  loss_profit: -1.0
  reports_dir: utils/raports

strategies:
  flat_fixed_stake:
    enabled: true
    base_stake: 1.0

  fixed_fraction:
    enabled: true
    fraction_pct: 5.0

  martingale_classic:
    enabled: true
    base_stake: 1.0

  martingale_linear:
    enabled: true
    base_stake: 1.0

  martingale_limited:
    enabled: true
    base_stake: 1.0
    sequence: [1, 1, 2, 4, 8, 16, 32]

  anti_martingale:
    enabled: true
    base_fraction_pct: 1.0
    win_multipliers:
      - min_win_streak: 2
        multiplier: 1.25
      - min_win_streak: 3
        multiplier: 1.5

  reduction_after_losses:
    enabled: true
    base_fraction_pct: 1.0
    loss_steps:
      - min_loss_streak: 1
        fraction_pct: 2.5
      - min_loss_streak: 2
        fraction_pct: 1.0

  pause_after_losses:
    enabled: true
    base_fraction_pct: 1.0
    pause_after_losses: 5
    pause_trades: 3

  combined:
    enabled: true
    base_fraction_pct: 1.0
    win_multipliers:
      - min_win_streak: 2
        multiplier: 1.25
      - min_win_streak: 3
        multiplier: 1.5
    loss_multipliers:
      - min_loss_streak: 3
        multiplier: 0.5
      - min_loss_streak: 5
        multiplier: 0.2
    pause_after_losses: 7
    pause_trades: 3
